name: Daily Build

on:
  # 每天 UTC 0:00 触发（北京时间 8:00）
  schedule:
    - cron: '0 0 * * *'
  # 允许手动触发，方便测试
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      # 可选：保留构建产物作为 Action Artifacts（方便在 Actions 页面下载）
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: naven-modern-build
          path: build/libs/*.jar

      # 自动发布到 GitHub Releases（预发布，每日覆盖）
      - name: Create Daily Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: daily                     # 固定标签，每日覆盖
          name: Daily Build (latest)
          body: |
            自动每日构建，基于 commit `${{ github.sha }}`
            触发时间：${{ github.event.head_commit.timestamp || github.run_attempt }}
          draft: false
          prerelease: true                    # 标记为预发布
          files: build/libs/*.jar
          allow_updates: true                 # 允许更新已存在的 release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
